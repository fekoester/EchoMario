project:
  name: toy_platformer_continuous_cnn_stable_laptop
  seed: 42
  device: cuda

env:
  name: toy_platformer
  randomize: true
  train_seed_mode: random
  eval_seed_start: 10000
  num_eval_seeds: 48

  width: 220
  height: 18
  camera_width: 36
  frame_stack: 4
  max_steps: 1400
  render_scale: 24
  observation_mode: full_screen
  include_state_features: true

  enable_gaps: true
  enable_bridge_platforms: true
  enable_upper_platforms: true
  enable_moving_enemies: true
  enable_coins: true
  enable_question_blocks: true
  enable_items: true

  num_gaps: 10
  num_bridge_gaps: 4
  num_enemies: 16
  num_coins: 40
  num_question_blocks: 8
  num_upper_platforms: 14
  num_mid_platforms: 12

  min_gap_width: 2
  max_gap_width: 4
  min_bridge_gap_width: 6
  max_bridge_gap_width: 10
  min_platform_width: 3
  max_platform_width: 8
  min_spacing: 8
  enemy_speed: 0.04

  stagnation_timeout: 190
  stagnation_epsilon: 0.05
  stagnation_penalty: -25.0

  progress_reward_scale: 1.5
  step_penalty: -0.003
  coin_reward: 5.0
  item_reward: 10.0
  stomp_reward: 20.0
  goal_reward: 100.0
  death_penalty: -30.0
  safe_landing_reward: 0.2
  gap_clear_reward: 5.0
  enemy_pass_reward: 10.0
  checkpoint_reward: 3.0
  checkpoint_interval: 20

reservoir:
  type: none

agent:
  model: cnn
  cnn_channels: [48, 96, 96]
  hidden_dim: 768
  lr: 0.00015
  entropy_coef: 0.0015
  entropy_coef_end: 0.0005
  entropy_anneal_steps: 50000000
  value_coef: 0.5
  clip_eps: 0.12
  max_grad_norm: 0.5
  log_std_init: -0.7
  min_log_std: -3.0
  max_log_std: 0.0

training:
  total_steps: 300000000
  num_envs: 64
  rollout_workers: 64
  env_start_method: fork
  rollout_progress_interval: 16
  rollout_steps: 256
  minibatch_size: 4096
  update_epochs: 4
  value_clip_eps: 0.2
  target_kl: 0.012
  gamma: 0.995
  gae_lambda: 0.95
  save_every_steps: 131072
  eval_every_steps: 131072
  eval_episodes: 48
  eval_workers: 48

logging:
  run_dir: runs/toy_platformer_continuous_cnn_stable_laptop
