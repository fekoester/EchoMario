project:
  name: toy_platformer_long_random
  seed: 42
  device: cpu

env:
  name: toy_platformer
  randomize: true
  train_seed_mode: random
  eval_seed_start: 10000
  num_eval_seeds: 20

  width: 260
  height: 18
  camera_width: 38
  max_steps: 1700
  render_scale: 24
  observation_mode: full_screen
  include_state_features: true

  enable_gaps: true
  enable_bridge_platforms: true
  enable_upper_platforms: true
  enable_moving_enemies: true
  enable_coins: true
  enable_question_blocks: true
  enable_items: true

  num_gaps: 12
  num_bridge_gaps: 5
  num_enemies: 20
  num_coins: 55
  num_question_blocks: 10
  num_upper_platforms: 18
  num_mid_platforms: 15

  min_gap_width: 2
  max_gap_width: 4
  min_bridge_gap_width: 6
  max_bridge_gap_width: 11
  min_platform_width: 3
  max_platform_width: 9
  min_spacing: 8
  enemy_speed: 0.045

  stagnation_timeout: 190
  stagnation_epsilon: 0.05
  stagnation_penalty: -5.0

reservoir:
  type: sparse_esn
  size: 1200
  spectral_radius: 0.96
  leak_rate: 0.35
  input_scale: 0.75
  sparsity: 0.01
  seed: 123
  state_norm: rms

agent:
  lr: 0.0002
  entropy_coef: 0.015
  value_coef: 0.5
  clip_eps: 0.15
  max_grad_norm: 0.5

training:
  total_steps: 1000000
  rollout_steps: 2048
  minibatch_size: 512
  update_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  save_every_steps: 25000
  eval_every_steps: 10000
  eval_episodes: 20

logging:
  run_dir: runs/toy_platformer_long_random
