project:
  name: toy_platformer_curriculum_stage1
  seed: 42
  device: cpu

env:
  name: toy_platformer
  randomize: true
  train_seed_mode: random
  eval_seed_start: 10000
  num_eval_seeds: 20
  width: 90
  camera_width: 30
  max_steps: 700
  render_scale: 22
  num_gaps: 0
  num_enemies: 0
  stagnation_timeout: 100
  stagnation_epsilon: 0.04
  stagnation_penalty: -4.0

reservoir:
  type: sparse_esn
  size: 800
  spectral_radius: 0.95
  leak_rate: 0.35
  input_scale: 0.7
  sparsity: 0.01
  seed: 123
  state_norm: rms

agent:
  lr: 0.00015
  entropy_coef: 0.003
  value_coef: 0.5
  clip_eps: 0.15
  max_grad_norm: 0.5

training:
  total_steps: 300000
  rollout_steps: 2048
  minibatch_size: 512
  update_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  save_every_steps: 25000
  eval_every_steps: 10000
  eval_episodes: 20

logging:
  run_dir: runs/toy_platformer_curriculum_stage1
