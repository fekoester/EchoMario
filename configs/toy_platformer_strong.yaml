project:
  name: toy_platformer_strong
  seed: 42
  device: cpu

env:
  name: toy_platformer
  max_steps: 700
  render_scale: 24

reservoir:
  type: sparse_esn
  size: 1000
  spectral_radius: 0.95
  leak_rate: 0.35
  input_scale: 0.7
  sparsity: 0.01
  seed: 123
  state_norm: rms

agent:
  lr: 0.0002
  entropy_coef: 0.01
  value_coef: 0.5
  clip_eps: 0.15
  max_grad_norm: 0.5

training:
  total_steps: 500000
  rollout_steps: 2048
  minibatch_size: 512
  update_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  save_every_steps: 25000
  eval_every_steps: 10000
  eval_episodes: 5

logging:
  run_dir: runs/toy_platformer_strong