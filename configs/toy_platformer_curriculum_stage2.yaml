project:
  name: toy_platformer_curriculum_stage2
  seed: 42
  device: cpu

env:
  name: toy_platformer
  randomize: true
  train_seed_mode: random
  eval_seed_start: 11000
  num_eval_seeds: 20
  width: 110
  camera_width: 32
  max_steps: 850
  render_scale: 22
  num_gaps: 6
  num_enemies: 0
  min_gap_width: 2
  max_gap_width: 3
  min_spacing: 8
  stagnation_timeout: 110
  stagnation_epsilon: 0.04
  stagnation_penalty: -4.0

reservoir:
  type: sparse_esn
  size: 1000
  spectral_radius: 0.95
  leak_rate: 0.35
  input_scale: 0.7
  sparsity: 0.01
  seed: 123
  state_norm: rms

agent:
  lr: 0.00012
  entropy_coef: 0.002
  value_coef: 0.5
  clip_eps: 0.15
  max_grad_norm: 0.5

training:
  total_steps: 450000
  rollout_steps: 2048
  minibatch_size: 512
  update_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  save_every_steps: 25000
  eval_every_steps: 10000
  eval_episodes: 20

logging:
  run_dir: runs/toy_platformer_curriculum_stage2
