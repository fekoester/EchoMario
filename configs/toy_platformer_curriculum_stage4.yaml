project:
  name: toy_platformer_curriculum_stage4
  seed: 42
  device: cpu

env:
  name: toy_platformer
  randomize: true
  train_seed_mode: random
  eval_seed_start: 13000
  num_eval_seeds: 20
  width: 150
  camera_width: 34
  max_steps: 1100
  render_scale: 24
  num_gaps: 9
  num_enemies: 10
  min_gap_width: 2
  max_gap_width: 4
  min_spacing: 8
  stagnation_timeout: 120
  stagnation_epsilon: 0.04
  stagnation_penalty: -5.0

reservoir:
  type: sparse_esn
  size: 1200
  spectral_radius: 0.96
  leak_rate: 0.35
  input_scale: 0.75
  sparsity: 0.01
  seed: 123
  state_norm: rms

agent:
  lr: 0.0001
  entropy_coef: 0.001
  value_coef: 0.5
  clip_eps: 0.15
  max_grad_norm: 0.5

training:
  total_steps: 1000000
  rollout_steps: 2048
  minibatch_size: 512
  update_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  save_every_steps: 25000
  eval_every_steps: 10000
  eval_episodes: 20

logging:
  run_dir: runs/toy_platformer_curriculum_stage4
