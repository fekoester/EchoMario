project:
  name: curriculum_laptop_stage3_varied_gaps
  seed: 42
  device: cuda

curriculum:
  success_threshold: 0.60

env:
  name: toy_platformer
  randomize: true
  train_seed_mode: random
  eval_seed_start: 12000
  num_eval_seeds: 40

  width: 190
  height: 18
  camera_width: 36
  frame_stack: 4
  max_steps: 1100
  render_scale: 24
  observation_mode: full_screen
  include_state_features: true
  action_mode: discrete_basic

  enable_gaps: true
  enable_bridge_platforms: true
  enable_upper_platforms: true
  enable_moving_enemies: false
  enable_coins: true
  enable_question_blocks: true
  enable_items: true

  num_gaps: 7
  num_bridge_gaps: 2
  num_enemies: 0
  num_coins: 24
  num_question_blocks: 4
  num_upper_platforms: 6
  num_mid_platforms: 6

  min_gap_width: 2
  max_gap_width: 3
  min_bridge_gap_width: 5
  max_bridge_gap_width: 7
  min_platform_width: 3
  max_platform_width: 7
  min_spacing: 10

  stagnation_timeout: 140
  stagnation_epsilon: 0.05
  stagnation_penalty: -25.0

  progress_reward_scale: 1.4
  step_penalty: -0.0025
  coin_reward: 0.4
  item_reward: 2.0
  stomp_reward: 0.0
  goal_reward: 100.0
  death_penalty: -30.0
  safe_landing_reward: 0.3
  gap_clear_reward: 5.0
  gap_jump_reward: 1.0
  gap_jump_lookahead: 5.0
  gap_jump_hold_reward: 0.03
  gap_jump_hold_lookahead: 5.0
  enemy_pass_reward: 0.0
  checkpoint_reward: 3.0
  checkpoint_interval: 20

reservoir:
  type: none

agent:
  model: cnn
  cnn_channels: [48, 96, 96]
  hidden_dim: 768
  lr: 0.0001
  entropy_coef: 0.0013
  entropy_coef_end: 0.0005
  entropy_anneal_steps: 25000000
  value_coef: 0.5
  clip_eps: 0.08
  max_grad_norm: 0.5
  log_std_init: -0.75
  min_log_std: -3.0
  max_log_std: 0.0

training:
  total_steps: 5000000
  num_envs: 128
  rollout_workers: 128
  env_start_method: fork
  rollout_progress_interval: 16
  rollout_steps: 128
  minibatch_size: 2048
  update_epochs: 2
  value_clip_eps: 0.2
  target_kl: 0.005
  gamma: 0.995
  gae_lambda: 0.95
  save_every_steps: 131072
  eval_every_steps: 131072
  eval_episodes: 40
  eval_workers: 40

logging:
  run_dir: runs/curriculum_laptop/stage3_varied_gaps
