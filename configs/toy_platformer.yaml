project:
  name: toy_platformer
  seed: 42
  device: cpu

env:
  name: toy_platformer
  max_steps: 700
  render_scale: 24

reservoir:
  type: sparse_esn
  size: 500
  spectral_radius: 0.9
  leak_rate: 0.45
  input_scale: 0.5
  sparsity: 0.02
  seed: 123
  state_norm: rms

agent:
  lr: 0.0005
  entropy_coef: 0.02
  value_coef: 0.5
  clip_eps: 0.2
  max_grad_norm: 0.5

training:
  total_steps: 250000
  rollout_steps: 1024
  minibatch_size: 256
  update_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  save_every_steps: 25000
  eval_every_steps: 25000
  eval_episodes: 5

logging:
  run_dir: runs/toy_platformer
