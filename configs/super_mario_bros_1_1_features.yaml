project:
  name: super_mario_bros_1_1_features
  seed: 42
  device: cpu

env:
  name: SuperMarioBros-1-1-v0
  train_seed_mode: fixed
  eval_seed_start: 10000
  num_eval_seeds: 10
  movement_set: simple
  frame_width: 32
  frame_height: 32
  frame_stack: 1
  crop_top: 32
  crop_bottom: 16

reservoir:
  type: sparse_esn
  size: 1500
  spectral_radius: 0.97
  leak_rate: 0.3
  input_scale: 0.6
  sparsity: 0.01
  seed: 123
  state_norm: rms

agent:
  lr: 0.0001
  entropy_coef: 0.001
  value_coef: 0.5
  clip_eps: 0.15
  max_grad_norm: 0.5

training:
  total_steps: 1000000
  rollout_steps: 2048
  minibatch_size: 512
  update_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  save_every_steps: 25000
  eval_every_steps: 10000
  eval_episodes: 10

logging:
  run_dir: runs/super_mario_bros_1_1_features
